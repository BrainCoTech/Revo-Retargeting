manus_revo3_retarget:
  ros__parameters:
    # Runtime side selection. Launch normally overrides this per process.
    hand_mode: both

    # Topics used by revo3_driver:
    #   /revo3_left/joint_forward_mit_controller/commands
    #   /revo3_right/joint_forward_mit_controller/commands
    use_revo3_namespace: true
    command_topic_suffix: joint_forward_mit_controller/commands
    retarget_target_topic_suffix: joint_forward_mit_controller/retarget_targets
    left_command_topic: ""
    right_command_topic: ""
    left_retarget_target_topic: ""
    right_retarget_target_topic: ""

    # Retarget updates follow Manus callback cadence. MIT commands publish from
    # a separate timer and linearly interpolate between adjacent retarget targets.
    mit_command_publish_hz: 200.0

    # CPU/timing profile output.
    profile_debug_enabled: true
    profile_log_period_s: 1.0
    profile_topic: /manus_revo3_retarget/profile_events

    # MIT controller gains. Per-joint values set to -1.0 inherit defaults.
    mit_default_kp: 0.4
    mit_default_kd: 0.05

    mit_left_little_MPR_joint_kp: 1.0
    mit_left_little_MPR_joint_kd: -1.0
    mit_left_little_MCP_joint_kp: -1.0
    mit_left_little_MCP_joint_kd: -1.0
    mit_left_little_PIP_joint_kp: -1.0
    mit_left_little_PIP_joint_kd: -1.0
