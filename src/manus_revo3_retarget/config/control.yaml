---
manus_revo3_retarget:
  ros__parameters:
    hand_mode: both
    use_revo3_namespace: true
    command_topic_suffix: joint_forward_mit_controller/commands
    retarget_target_topic_suffix: joint_forward_mit_controller/retarget_targets
    mit_command_publish_hz: 200.0
    mit_velocity_feedforward_enabled: true
    mit_default_kp: 0.2
    mit_default_kd: 0.02

    # Per-joint MIT gains. Set to -1 to use mit_default_kp / mit_default_kd.
